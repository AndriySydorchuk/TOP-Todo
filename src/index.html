<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
</head>

<body>
    <aside class="sidebar">
        <nav class="nav">
            <ul class="nav__list">
                <li class="nav__list-item">
                    <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
                        <title xmlns="">search</title>
                        <path fill="currentColor"
                            d="m19.6 21l-6.3-6.3q-.75.6-1.725.95T9.5 16q-2.725 0-4.612-1.888T3 9.5t1.888-4.612T9.5 3t4.613 1.888T16 9.5q0 1.1-.35 2.075T14.7 13.3l6.3 6.3zM9.5 14q1.875 0 3.188-1.312T14 9.5t-1.312-3.187T9.5 5T6.313 6.313T5 9.5t1.313 3.188T9.5 14" />
                    </svg>
                    Search
                </li>
                <li class="nav__list-item list-item-active">
                    <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
                        <title xmlns="">inbox-outline</title>
                        <path fill="currentColor"
                            d="M5 21q-.825 0-1.412-.587T3 19V5q0-.825.588-1.412T5 3h14q.825 0 1.413.588T21 5v14q0 .825-.587 1.413T19 21zm0-2h14v-3h-3q-.75.95-1.787 1.475T12 18t-2.212-.525T8 16H5zm8.725-3.55Q14.5 14.9 14.8 14H19V5H5v9h4.2q.3.9 1.075 1.45T12 16t1.725-.55M5 19h14z" />
                    </svg>
                    Inbox
                </li>
                <li class="nav__list-item">
                    <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
                        <title xmlns="">today</title>
                        <path fill="currentColor"
                            d="M7.225 15.775Q6.5 15.05 6.5 14t.725-1.775T9 11.5t1.775.725T11.5 14t-.725 1.775T9 16.5t-1.775-.725M5 22q-.825 0-1.412-.587T3 20V6q0-.825.588-1.412T5 4h1V2h2v2h8V2h2v2h1q.825 0 1.413.588T21 6v14q0 .825-.587 1.413T19 22zm0-2h14V10H5z" />
                    </svg>
                    Today
                </li>
                <li class="nav__list-item">
                    <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
                        <title xmlns="">event-upcoming</title>
                        <path fill="currentColor"
                            d="M15 22v-2h4V10H5v4H3V6q0-.825.588-1.412T5 4h1V2h2v2h8V2h2v2h1q.825 0 1.413.588T21 6v14q0 .825-.587 1.413T19 22zm-7 2l-1.4-1.4L9.175 20H1v-2h8.175L6.6 15.4L8 14l5 5z" />
                    </svg>
                    Upcoming
                </li>
            </ul>
            <ul class="projects__list">
                <div class="projects__list-title">
                    Projects
                </div>
                <li class="projects__list-item">
                    <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
                        <title xmlns="">hashtag</title>
                        <path fill="currentColor"
                            d="m5.41 21l.71-4h-4l.35-2h4l1.06-6h-4l.35-2h4l.71-4h2l-.71 4h6l.71-4h2l-.71 4h4l-.35 2h-4l-1.06 6h4l-.35 2h-4l-.71 4h-2l.71-4h-6l-.71 4zM9.53 9l-1.06 6h6l1.06-6z" />
                    </svg>
                    Getting Started
                </li>
            </ul>
            </ul>
        </nav>
    </aside>

    <main class="main">
        <h2 class="title">Inbox</h2>
        <div class="empty__state">
            <img src="https://todoist.b-cdn.net/assets/images/0e096c1a6d20e080.png"
                srcset="https://todoist.b-cdn.net/assets/images/4436c0a0088ea86b.png 2x, https://todoist.b-cdn.net/assets/images/87bb01d772dee39a.png 3x">
            Capture now, plan later
            <div class="empty__state-actions">
                Inbox is your go-to spot for quick task entry. Clear your mind now, organize when you’re ready.
                <button class="btn addtask-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
                        <title xmlns="">baseline-plus</title>
                        <path fill="currentColor" d="M19 12.998h-6v6h-2v-6H5v-2h6v-6h2v6h6z" />
                    </svg>
                    Add task
                </button>
            </div>

        </div>
    </main>
</body>

</html>
